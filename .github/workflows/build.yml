name: Build & Release APK

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]           # 推送 v1.0, v1.2 等标签时也触发
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:          # 手动触发

# 给 GITHUB_TOKEN 写入 Releases 的权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: ☕ 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: 🤖 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔧 授权 Gradle 执行权限
        run: chmod +x gradlew

      - name: 🏗️ 编译所有 APK
        run: ./gradlew assembleDebug assembleRelease

      - name: 📦 上传 Debug APK（构建产物）
        uses: actions/upload-artifact@v4
        with:
          name: WVP-APP-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: 📦 上传 Release APK（构建产物）
        uses: actions/upload-artifact@v4
        with:
          name: WVP-APP-release
          path: app/build/outputs/apk/release/*.apk

  # ========== 发布到 GitHub Releases ==========
  release:
    needs: build
    # 只在 push 到 main/master 或 push v* 标签时发布
    if: >
      github.event_name == 'push' &&
      (github.ref_name == 'main' || github.ref_name == 'master' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest

    steps:
      - name: 📥 下载构建好的 APK
        uses: actions/download-artifact@v4
        with:
          name: WVP-APP-release
          path: release-apk

      - name: 🏷️ 确定版本号和 Release 名称
        id: version
        run: |
          # 如果是从 v* 标签触发，取标签名；否则用日期+短哈希
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="nightly-$(date +%Y%m%d)-${GITHUB_SHA:0:7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 📦 获取 APK 文件列表
        id: apk
        run: |
          APK_PATH=$(ls release-apk/*.apk 2>/dev/null | head -1)
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "name=$(basename "$APK_PATH")" >> $GITHUB_OUTPUT

      - name: 🚀 创建/更新 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "WVP Android APP ${{ steps.version.outputs.version }}"
          body: |
            ## WVP Android-APP 自动构建

            - 版本: `${{ steps.version.outputs.version }}`
            - 提交: ${{ github.sha }}
            - 构建时间: ${{ github.event.repository.updated_at }}

            ### 下载

            - [WVP-APP-release.apk](${{ steps.apk.outputs.name }}) — Release 包（正式版）
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
